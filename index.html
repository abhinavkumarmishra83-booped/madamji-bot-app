<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madam Ji Ke Liye</title>
    <style>
        body {
            margin: 0; padding: 0; box-sizing: border-box;
            background-color: #ffe6e6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden; position: relative;
        }
        .hearts-bg {
            position: absolute; font-size: 24px; opacity: 0.2;
            animation: float 6s linear infinite; bottom: -50px;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
        .dashboard {
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;
            max-width: 400px; width: 85%; position: relative;
            min-height: 280px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
            border: 2px solid #ffb3b3;
        }
        h2 { color: #ff4d6d; margin: 0 0 10px 0; }
        #message-box { font-size: 18px; color: #555; margin-bottom: 30px; font-weight: 600; min-height: 54px; }
        .btn-container { display: flex; justify-content: center; gap: 30px; width: 100%; height: 60px; position: relative; }
        .btn { padding: 12px 35px; font-size: 16px; font-weight: bold; border: none; border-radius: 25px; cursor: pointer; height: 45px; }
        #yes-btn { background-color: #ff4d6d; color: white; order: 2; }
        #no-btn { background-color: #dcdcdc; color: #333; order: 1; position: absolute; left: 15%; transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        .upload-section { display: none; width: 100%; }
        .file-input-container { margin-bottom: 20px; }
        input[type="file"] { font-size: 14px; color: #555; padding: 10px; background: #fff0f0; border: 1px dashed #ffb3b3; border-radius: 10px; width: 80%; cursor: pointer; }
        .submit-button-container { display: none; width: 100%; }
        .submit-btn { width: 100%; padding: 14px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 15px; cursor: pointer; background: linear-gradient(45deg, #ff4d6d, #ff758f); box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3); }
    </style>
</head>
<body>
    <div class="hearts-bg" style="left: 10%; animation-delay: 0s;">💖</div>
    <div class="hearts-bg" style="left: 50%; animation-delay: 2s;">💓</div>
    <div class="hearts-bg" style="left: 85%; animation-delay: 1s;">💝</div>

    <div class="dashboard">
        <h2>✨ Hello Madam Ji ✨</h2>
        <div id="message-box">Madam ji photo bej sakti ho? 📸</div>

        <div class="btn-container" id="btn-container">
            <button class="btn" id="yes-btn" onclick="sayYes()">Yes</button>
            <button class="btn" id="no-btn" onmouseover="flyNo()" onclick="flyNo()">No</button>
        </div>

        <div class="upload-section" id="upload-section">
            <div class="file-input-container">
                <p style="color: #666; font-size: 14px; margin-top: 0;">Apni photo select karein:</p>
                <input type="file" id="photo-input" accept="image/*" onchange="handleFileSelect()">
            </div>
            <div class="submit-button-container" id="submit-container">
                <button class="submit-btn" id="send-btn" onclick="uploadPhotoToServer()">Send Photo to Abhinav ❤️</button>
            </div>
        </div>
    </div>

    <script>
        const noMessages = ["Noo 🥺", "Aisa mat kro.. 💔", "Plz jaaneman maan jao na! ❤️"];
        let msgIndex = 0;

        function flyNo() {
            const noBtn = document.getElementById('no-btn');
            const msgBox = document.getElementById('message-box');
            msgBox.innerText = noMessages[msgIndex];
            msgIndex = (msgIndex + 1) % noMessages.length;
            const padding = 70;
            const randomX = Math.floor(Math.random() * (window.innerWidth - noBtn.offsetWidth - padding * 2)) + padding - (window.innerWidth / 2 - 150);
            const randomY = Math.floor(Math.random() * (window.innerHeight - noBtn.offsetHeight - padding * 2)) + padding - (window.innerHeight / 2);
            noBtn.style.left = randomX + 'px'; noBtn.style.top = randomY + 'px';
        }

        function sayYes() {
            document.getElementById('btn-container').style.display = 'none';
            document.getElementById('message-box').innerText = "Thank you! Aab photo select kijiye 😍";
            document.getElementById('upload-section').style.display = 'block';
        }

        function handleFileSelect() {
            const fileInput = document.getElementById('photo-input');
            document.getElementById('submit-container').style.display = fileInput.files.length > 0 ? 'block' : 'none';
        }

        function uploadPhotoToServer() {
            const fileInput = document.getElementById('photo-input');
            const sendBtn = document.getElementById('send-btn');
            const msgBox = document.getElementById('message-box');
            
            if (fileInput.files.length === 0) return;

            const file = fileInput.files[0];
            const formData = new FormData();
            
            // Render friendly dynamic handling
            formData.append("photo", file);

            sendBtn.disabled = true;
            sendBtn.innerText = "Sending... ⏳";

            // Relative Path use kiya hai taaki live deploy hote hi automatic chal jaye
            fetch("/send-photo", {
                method: "POST",
                body: formData,
                cache: "no-cache"
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('upload-section').style.display = 'none';
                    msgBox.innerHTML = "Success! Aapki photo Abhinav tak pahunch gayi hai! 💖🎉";
                } else {
                    sendBtn.disabled = false;
                    sendBtn.innerText = "Try Again 🔄";
                    alert("Error: " + data.message);
                }
            })
            .catch(error => {
                sendBtn.disabled = false;
                sendBtn.innerText = "Try Again 🔄";
                alert("Server Error. Please try again after website reloads.");
            });
        }
    </script>
</body>
</html>
