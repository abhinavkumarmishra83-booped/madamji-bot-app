

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #ffe6e6;
            padding: 50px;
        }
        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            display: inline-block;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 10px;
        }
        #yes-btn { background-color: #ff4d4d; color: white; }
        #no-btn { background-color: #ccc; color: black; position: absolute; }
        #upload-section { display: none; margin-top: 20px; }
        #submit-container { display: none; margin-top: 15px; }
        .submit-btn { background-color: #28a745; color: white; }
    </style>
</head>
<body>

<div class="box">
    <h2 id="message-box">Madam ji, kya aap mere saath date par chalengi? ❤️</h2>
    <div id="btn-container">
        <button id="yes-btn" onclick="sayYes()">Haan</button>
        <button id="no-btn" onclick="flyNo()">Nahi</button>
    </div>

    <div id="upload-section">
        <p style="color: #666;">Apni ek pyaari si photo select karein:</p>
        <input type="file" id="photo-input" accept="image/*" onchange="handleFileSelect()">
        
        <div id="submit-container">
            <button class="submit-btn" id="send-btn" onclick="uploadPhotoToServer()">Send Photo to Abhinav ❤️</button>
        </div>
    </div>
</div>

<script>
    const noMessages = ["Neo 🤭", "Aisa mat kro.. 💔", "Plz jaaneman maan jao na! 🥺"];
    let msgIndex = 0;

    function flyNo() {
        const noBtn = document.getElementById('no-btn');
        const msgBox = document.getElementById('message-box');
        msgBox.innerText = noMessages[msgIndex];
        msgIndex = (msgIndex + 1) % noMessages.length;
        
        const padding = 70;
        const randomX = Math.floor(Math.random() * (window.innerWidth - noBtn.offsetWidth - padding * 2)) + padding;
        const randomY = Math.floor(Math.random() * (window.innerHeight - noBtn.offsetHeight - padding * 2)) + padding;
        noBtn.style.left = randomX + 'px';
        noBtn.style.top = randomY + 'px';
    }

    function sayYes() {
        document.getElementById('btn-container').style.display = 'none';
        document.getElementById('message-box').innerText = "Thank you! Ab photo select kijiye 😍";
        document.getElementById('upload-section').style.display = 'block';
    }

    function handleFileSelect() {
        const fileInput = document.getElementById('photo-input');
        document.getElementById('submit-container').style.display = fileInput.files.length > 0 ? 'block' : 'none';
    }

    function uploadPhotoToServer() {
        const fileInput = document.getElementById('photo-input');
        const sendBtn = document.getElementById('send-btn');
        const msgBox = document.getElementById('message-box');

        if (fileInput.files.length === 0) return;
        const file = fileInput.files[0];

        sendBtn.disabled = true;
        sendBtn.innerText = "Sending... ⏳";

        // IMAGE COMPRESSION LOGIC (Taaki heavy/HEIC photos instant send ho sakein)
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function () {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; // Size chota karne ke liye
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else {
                    if (height > MAX_WIDTH) {
                        width *= MAX_WIDTH / height;
                        height = MAX_WIDTH;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // Compress karke blob me convert karna
                canvas.toBlob(function (blob) {
                    const formData = new FormData();
                    formData.append("photo", blob, "photo.jpg");

                    fetch("/send-photo", {
                        method: "POST",
                        body: formData,
                        cache: "no-cache"
                    })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            document.getElementById('upload-section').style.display = 'none';
                            msgBox.innerHTML = "Success! Aapki photo Abhinav tak pahunch gayi hai! 💑❤️";
                        } else {
                            sendBtn.disabled = false;
                            sendBtn.innerText = "Try Again 🔄";
                            alert("Error: " + data.message);
                        }
                    })
                    .catch(error => {
                        sendBtn.disabled = false;
                        sendBtn.innerText = "Try Again 🔄";
                        alert("Server Error. Please try again.");
                    });
                }, "image/jpeg", 0.7); // 70% Quality compression
            };
        };
    }
</script>
</body>
</html>
